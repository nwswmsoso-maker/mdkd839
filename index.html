<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو التسجيل الاحترافي - MP3 + مؤشر حقيقي</title>
    <!-- إضافة مكتبة lamejs لتحويل الصوت إلى MP3 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- نفس أنماط CSS السابقة بدون تغيير --- */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #141821;
            --bg-panel: #1a1f2e;
            --accent-red: #ff2e5f;
            --accent-cyan: #00f0ff;
            --accent-gold: #ffd700;
            --text-primary: #e8eaed;
            --text-secondary: #8b92a8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 46, 95, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.05) 0%, transparent 50%);
        }

        .studio-container {
            width: 95%;
            max-width: 1400px;
            padding: 40px;
        }

        .studio-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .studio-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 46, 95, 0.5)); }
        }

        .studio-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .main-panel {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .main-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-cyan), var(--accent-red));
            opacity: 0.6;
        }

        .visualizer-section {
            margin-bottom: 30px;
            position: relative;
        }

        .visualizer-container {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .visualizer-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(0deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        #visualizer {
            width: 100%;
            height: 250px;
            display: block;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }

        .waveform-container {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-top: 20px;
            min-height: 200px;
            position: relative;
            overflow: hidden;
        }

        #waveform {
            width: 100%;
            height: 150px;
            display: block;
            filter: drop-shadow(0 0 8px rgba(255, 46, 95, 0.4));
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .control-panel {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .control-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-record {
            background: linear-gradient(135deg, var(--accent-red), #d91d4d);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 46, 95, 0.4);
        }

        .btn-record:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 46, 95, 0.6);
        }

        .btn-record.recording {
            animation: recordPulse 1.5s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 46, 95, 0.4); }
            50% { box-shadow: 0 4px 30px rgba(255, 46, 95, 0.8), 0 0 40px rgba(255, 46, 95, 0.4); }
        }

        .btn-stop {
            background: linear-gradient(135deg, #4a5568, #2d3748);
            color: white;
        }

        .btn-stop:hover {
            background: linear-gradient(135deg, #5a6578, #3d4758);
        }

        .btn-play {
            background: linear-gradient(135deg, var(--accent-cyan), #00b8d4);
            color: var(--bg-primary);
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.6);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--accent-gold), #ffb700);
            color: var(--bg-primary);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .metrics-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .metric {
            background: rgba(0, 240, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-cyan);
        }

        .metric-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .metric-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            direction: ltr;
            text-align: left;
        }

        /* --- نمط مؤشر VU الجديد --- */
        .vu-meter-classic {
            margin-top: 20px;
            background: #0d1117;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #vuCanvas {
            width: 100%;
            height: 80px;
            display: block;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .status-dot.recording {
            background: var(--accent-red);
            animation: recordingPulse 0.8s ease-in-out infinite;
        }

        @keyframes recordingPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 46, 95, 0.7); }
            50% { opacity: 1; box-shadow: 0 0 0 8px rgba(255, 46, 95, 0); }
        }

        .quality-badge {
            display: inline-block;
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border: 1px solid var(--accent-gold);
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-gold);
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .studio-container {
                padding: 20px;
            }

            .main-panel {
                padding: 25px;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="studio-container">
        <div class="studio-header">
            <h1 class="studio-title">استوديو التسجيل الاحترافي</h1>
            <p class="studio-subtitle">تسجيل بصيغة MP3 مع مؤشرات استوديو حقيقية</p>
        </div>

        <div class="main-panel">
            <div class="visualizer-section">
                <span class="control-label">📊 المؤشر الصوتي المباشر</span>
                <div class="visualizer-container">
                    <div class="visualizer-grid"></div>
                    <canvas id="visualizer"></canvas>
                </div>
                
                <div class="quality-badge">
                    ✨ تسجيل MP3 عالي الجودة - 256kbps
                </div>
            </div>

            <div class="waveform-container">
                <span class="control-label">🎵 شكل الموجة الصوتية</span>
                <canvas id="waveform"></canvas>
            </div>

            <div class="controls-grid">
                <div class="control-panel">
                    <span class="control-label">🎙️ التحكم بالتسجيل</span>
                    <div class="button-group">
                        <button class="btn btn-record" id="recordBtn">
                            ● تسجيل
                        </button>
                        <button class="btn btn-stop" id="stopBtn" disabled>
                            ■ إيقاف
                        </button>
                    </div>
                    <!-- مؤشر VU الكلاسيكي الجديد -->
                    <div class="vu-meter-classic">
                        <canvas id="vuCanvas"></canvas>
                    </div>
                </div>

                <div class="control-panel">
                    <span class="control-label">▶️ التشغيل والحفظ</span>
                    <div class="button-group">
                        <button class="btn btn-play" id="playBtn" disabled>
                            ▶ تشغيل
                        </button>
                        <button class="btn btn-download" id="downloadBtn" disabled>
                            ⬇ تحميل MP3
                        </button>
                    </div>
                </div>

                <div class="control-panel">
                    <span class="control-label">📈 معلومات التسجيل</span>
                    <div class="metrics-display">
                        <div class="metric">
                            <div class="metric-label">الوقت</div>
                            <div class="metric-value" id="timer">00:00</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">الحالة</div>
                            <div class="status-indicator">
                                <span class="status-dot" id="statusDot"></span>
                                <span id="statusText">جاهز</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ProfessionalRecorder {
            constructor() {
                this.mediaRecorder = null;
                this.audioContext = null;
                this.analyser = null;
                this.audioChunks = [];
                this.audioBlob = null;
                this.audioUrl = null;
                this.isRecording = false;
                this.startTime = 0;
                this.timerInterval = null;
                this.animationFrame = null;
                
                // عناصر canvas المختلفة
                this.canvas = document.getElementById('visualizer');
                this.canvasCtx = this.canvas.getContext('2d');
                this.waveformCanvas = document.getElementById('waveform');
                this.waveformCtx = this.waveformCanvas.getContext('2d');
                this.vuCanvas = document.getElementById('vuCanvas');
                this.vuCtx = this.vuCanvas.getContext('2d');
                
                this.setupCanvas();
                this.bindEvents();
                this.drawIdleVisualizer();
                this.drawVUMeter(0); // رسم مؤشر VU في وضع السكون
            }

            setupCanvas() {
                const dpr = window.devicePixelRatio || 1;
                
                // Visualizer canvas
                this.canvas.width = this.canvas.offsetWidth * dpr;
                this.canvas.height = this.canvas.offsetHeight * dpr;
                this.canvasCtx.scale(dpr, dpr);
                
                // Waveform canvas
                this.waveformCanvas.width = this.waveformCanvas.offsetWidth * dpr;
                this.waveformCanvas.height = this.waveformCanvas.offsetHeight * dpr;
                this.waveformCtx.scale(dpr, dpr);

                // VU Meter canvas
                this.vuCanvas.width = this.vuCanvas.offsetWidth * dpr;
                this.vuCanvas.height = this.vuCanvas.offsetHeight * dpr;
                this.vuCtx.scale(dpr, dpr);
            }

            // رسم مؤشر VU الكلاسيكي بإبرة
            drawVUMeter(rmsLevel) {
                const width = this.vuCanvas.offsetWidth;
                const height = this.vuCanvas.offsetHeight;
                const ctx = this.vuCtx;
                
                ctx.clearRect(0, 0, width, height);
                
                // خلفية المؤشر
                ctx.fillStyle = '#0a0c10';
                ctx.fillRect(0, 0, width, height);
                
                // رسم القوس المتدرج
                const centerX = width / 2;
                const centerY = height - 10;
                const radius = Math.min(width, height) * 0.7;
                
                // ألوان القوس (أخضر -> أصفر -> أحمر)
                const gradient = ctx.createConicalGradient(0, -Math.PI * 0.8, centerX, centerY);
                gradient.addColorStop(0, '#4caf50');
                gradient.addColorStop(0.6, '#ffeb3b');
                gradient.addColorStop(1, '#f44336');
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, Math.PI * 0.8, Math.PI * 2.2);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 8;
                ctx.stroke();
                
                // علامات القياس
                ctx.fillStyle = '#ffffff';
                ctx.font = '8px Orbitron';
                ctx.textAlign = 'center';
                for (let i = 0; i <= 10; i++) {
                    const angle = Math.PI * 0.8 + (i / 10) * (Math.PI * 1.4);
                    const x = centerX + Math.cos(angle) * (radius - 15);
                    const y = centerY + Math.sin(angle) * (radius - 15);
                    ctx.fillText(i * 10, x, y);
                }
                
                // رسم الإبرة
                const needleAngle = Math.PI * 0.8 + (rmsLevel / 100) * (Math.PI * 1.4);
                const needleLength = radius - 10;
                const needleX = centerX + Math.cos(needleAngle) * needleLength;
                const needleY = centerY + Math.sin(needleAngle) * needleLength;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(needleX, needleY);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // مركز الإبرة
                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.fill();
            }

            bindEvents() {
                document.getElementById('recordBtn').addEventListener('click', () => this.startRecording());
                document.getElementById('stopBtn').addEventListener('click', () => this.stopRecording());
                document.getElementById('playBtn').addEventListener('click', () => this.playRecording());
                document.getElementById('downloadBtn').addEventListener('click', () => this.downloadAsMP3());
            }

            async startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false,
                            sampleRate: 48000,
                            channelCount: 1 // أحادي للمعالجة الأدق
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 48000
                    });
                    
                    const source = this.audioContext.createMediaStreamSource(stream);
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 2048;
                    this.analyser.smoothingTimeConstant = 0.85;
                    source.connect(this.analyser);

                    // التسجيل بصيغة WAV للتحويل لاحقاً إلى MP3
                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });

                    this.audioChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.audioChunks.push(event.data);
                        }
                    };

                    this.mediaRecorder.onstop = async () => {
                        this.audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                        this.audioUrl = URL.createObjectURL(this.audioBlob);
                        this.drawWaveform();
                        document.getElementById('playBtn').disabled = false;
                        document.getElementById('downloadBtn').disabled = false;
                    };

                    this.mediaRecorder.start();
                    this.isRecording = true;
                    this.startTime = Date.now();
                    this.startTimer();
                    this.visualize();
                    this.updateUI(true);

                } catch (error) {
                    console.error('خطأ في الوصول للميكروفون:', error);
                    alert('لا يمكن الوصول إلى الميكروفون. يرجى منح الإذن.');
                }
            }

            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.mediaRecorder.stream.getTracks().forEach(track => track.stop());
                    this.isRecording = false;
                    this.stopTimer();
                    cancelAnimationFrame(this.animationFrame);
                    this.updateUI(false);
                    
                    if (this.audioContext) {
                        this.audioContext.close();
                    }
                }
            }

            visualize() {
                if (!this.isRecording) return;

                const bufferLength = this.analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                this.analyser.getByteTimeDomainData(dataArray); // استخدام TimeDomain لحساب RMS بدقة

                // --- حساب RMS (جذر متوسط التربيع) للمؤشر الحقيقي ---
                let sumSquares = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const normalized = (dataArray[i] - 128) / 128; // تحويل إلى نطاق -1 إلى 1
                    sumSquares += normalized * normalized;
                }
                const rms = Math.sqrt(sumSquares / bufferLength);
                const rmsPercentage = Math.min(100, rms * 150); // تحويل إلى نسبة مئوية
                
                // تحديث مؤشر VU الكلاسيكي
                this.drawVUMeter(rmsPercentage);

                // رسم المؤشر البصري (الطيفي)
                const width = this.canvas.offsetWidth;
                const height = this.canvas.offsetHeight;
                this.canvasCtx.fillStyle = '#141821';
                this.canvasCtx.fillRect(0, 0, width, height);

                const barWidth = (width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * height * 0.8;
                    const gradient = this.canvasCtx.createLinearGradient(0, height - barHeight, 0, height);
                    gradient.addColorStop(0, '#00f0ff');
                    gradient.addColorStop(1, '#ff2e5f');
                    this.canvasCtx.fillStyle = gradient;
                    this.canvasCtx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
                    x += barWidth + 1;
                }

                this.animationFrame = requestAnimationFrame(() => this.visualize());
            }

            // --- دالة تحويل وتسجيل الصوت بصيغة MP3 ---
            downloadAsMP3() {
                if (!this.audioBlob) return;

                const fileReader = new FileReader();
                fileReader.onload = () => {
                    const arrayBuffer = fileReader.result;
                    const audioContext = new AudioContext();
                    
                    audioContext.decodeAudioData(arrayBuffer, (audioBuffer) => {
                        const mp3Blob = this.encodeToMP3(audioBuffer);
                        const url = URL.createObjectURL(mp3Blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `تسجيل_ستوديو_${new Date().getTime()}.mp3`;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                };
                fileReader.readAsArrayBuffer(this.audioBlob);
            }

            encodeToMP3(audioBuffer) {
                const sampleRate = audioBuffer.sampleRate;
                const numChannels = audioBuffer.numberOfChannels;
                const samples = audioBuffer.getChannelData(0); // القناة الأولى
                
                const mp3Encoder = new lamejs.Mp3Encoder(1, sampleRate, 256); // 256kbps عالي الجودة
                const sampleBlockSize = 1152;
                
                let mp3Data = [];
                
                for (let i = 0; i < samples.length; i += sampleBlockSize) {
                    const sampleChunk = samples.subarray(i, i + sampleBlockSize);
                    const mp3buf = mp3Encoder.encodeBuffer(this.convertToInt16(sampleChunk));
                    if (mp3buf.length > 0) {
                        mp3Data.push(mp3buf);
                    }
                }
                
                const mp3buf = mp3Encoder.flush();
                if (mp3buf.length > 0) {
                    mp3Data.push(mp3buf);
                }
                
                return new Blob(mp3Data, { type: 'audio/mp3' });
            }

            convertToInt16(float32Array) {
                const int16Array = new Int16Array(float32Array.length);
                for (let i = 0; i < float32Array.length; i++) {
                    let s = Math.max(-1, Math.min(1, float32Array[i]));
                    s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    int16Array[i] = s;
                }
                return int16Array;
            }

            // --- بقية الدوال بدون تغيير جوهري ---
            drawIdleVisualizer() {
                const width = this.canvas.offsetWidth;
                const height = this.canvas.offsetHeight;
                this.canvasCtx.fillStyle = '#141821';
                this.canvasCtx.fillRect(0, 0, width, height);
                this.canvasCtx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
                this.canvasCtx.lineWidth = 2;
                this.canvasCtx.beginPath();
                for (let i = 0; i < width; i++) {
                    const y = height / 2 + Math.sin(i * 0.02) * 20;
                    if (i === 0) this.canvasCtx.moveTo(i, y);
                    else this.canvasCtx.lineTo(i, y);
                }
                this.canvasCtx.stroke();
            }

            async drawWaveform() {
                if (!this.audioBlob) return;
                const audioContext = new AudioContext();
                const arrayBuffer = await this.audioBlob.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const channelData = audioBuffer.getChannelData(0);
                const width = this.waveformCanvas.offsetWidth;
                const height = this.waveformCanvas.offsetHeight;
                this.waveformCtx.fillStyle = '#141821';
                this.waveformCtx.fillRect(0, 0, width, height);
                const step = Math.ceil(channelData.length / width);
                const amp = height / 2;
                this.waveformCtx.strokeStyle = '#ff2e5f';
                this.waveformCtx.lineWidth = 2;
                this.waveformCtx.beginPath();
                for (let i = 0; i < width; i++) {
                    let min = 1.0, max = -1.0;
                    for (let j = 0; j < step; j++) {
                        const datum = channelData[(i * step) + j];
                        if (datum < min) min = datum;
                        if (datum > max) max = datum;
                    }
                    const yLow = (1 + min) * amp;
                    const yHigh = (1 + max) * amp;
                    this.waveformCtx.moveTo(i, yLow);
                    this.waveformCtx.lineTo(i, yHigh);
                }
                this.waveformCtx.stroke();
            }

            playRecording() {
                if (this.audioUrl) {
                    const audio = new Audio(this.audioUrl);
                    audio.play();
                }
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    document.getElementById('timer').textContent = 
                        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }, 1000);
            }

            stopTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
            }

            updateUI(recording) {
                const recordBtn = document.getElementById('recordBtn');
                const stopBtn = document.getElementById('stopBtn');
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                if (recording) {
                    recordBtn.disabled = true;
                    recordBtn.classList.add('recording');
                    stopBtn.disabled = false;
                    statusDot.classList.add('recording');
                    statusText.textContent = 'جاري التسجيل...';
                } else {
                    recordBtn.disabled = false;
                    recordBtn.classList.remove('recording');
                    stopBtn.disabled = true;
                    statusDot.classList.remove('recording');
                    statusText.textContent = 'جاهز';
                    this.drawIdleVisualizer();
                    this.drawVUMeter(0);
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new ProfessionalRecorder();
        });
    </script>
</body>
</html>
