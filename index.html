<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيلات صوفي ال دليم | استوديو احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #07090e;
            --bg-panel: #11151d;
            --bg-darker: #0a0c10;
            --gold-primary: #e5c158;
            --gold-glow: #ffd700;
            --cyan-accent: #00f0ff;
            --neon-red: #ff2a5f;
            --neon-green: #00ff66;
            --text-main: #f1f2f6;
            --text-muted: #718096;
            --border-gold: rgba(229, 193, 88, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(229, 193, 88, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.02) 0%, transparent 40%);
        }

        .studio-container {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-panel);
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            padding: 35px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative;
        }

        /* شريط علوي فاخر للحماية الزخرفية */
        .studio-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), var(--cyan-accent), var(--gold-primary), transparent);
            border-radius: 24px 24px 0 0;
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .studio-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            color: var(--gold-primary);
            text-shadow: 0 0 15px rgba(229, 193, 88, 0.3);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .studio-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* منطقة العدادات والمؤشرات الحقيقية - مثل الـ FL Studio */
        .meters-grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 900px) {
            .meters-grid { grid-template-columns: 1fr; }
        }

        .visualizer-wrapper {
            background: var(--bg-darker);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            position: relative;
        }

        .panel-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--gold-primary);
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* شاشة محلل الترددات الرئيسي */
        #spectraman {
            width: 100%;
            height: 240px;
            background: #05070a;
            display: block;
            border-radius: 8px;
        }

        /* وحدة قياس الـ dB القمة (Fruity Peak Meter) */
        .peak-meter-panel {
            background: var(--bg-darker);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .db-scale-container {
            display: flex;
            height: 100%;
            gap: 10px;
            position: relative;
            padding-top: 15px;
        }

        .vu-channel {
            flex: 1;
            background: #030508;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }

        .vu-fill-bar {
            width: 100%;
            height: 0%;
            background: linear-gradient(0deg, var(--neon-green) 0%, #ffeb3b 70%, var(--neon-red) 90%);
            transition: height 0.05s linear;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        /* مؤشر الـ Clip (الاحتراق الصوتي عند تضخم الإشارة) */
        .clip-indicator {
            width: 12px;
            height: 12px;
            background: #20050b;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            border: 1px solid rgba(255,0,0,0.2);
            transition: background 0.1s ease;
        }

        .clip-indicator.active {
            background: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .db-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Orbitron', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: right;
            height: 100%;
            padding-bottom: 5px;
        }

        /* وحدة مظهر الموجة الممتدة */
        .waveform-wrapper {
            background: var(--bg-darker);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        #wave-candy {
            width: 100%;
            height: 100px;
            background: #05070a;
            display: block;
            border-radius: 8px;
        }

        /* لوحة التحكم والأزرار الميكانيكية */
        .control-room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .deck-panel {
            background: #161b26;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .btn-deck {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-record {
            background: #2d0d16;
            color: var(--neon-red);
            border: 1px solid rgba(255, 42, 95, 0.3);
        }

        .btn-record:hover:not(:disabled) {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 42, 95, 0.4);
        }

        .btn-record.recording {
            background: var(--neon-red);
            color: #fff;
            animation: flPulse 1s infinite alternate;
        }

        @keyframes flPulse {
            0% { box-shadow: 0 0 5px var(--neon-red); }
            100% { box-shadow: 0 0 25px var(--neon-red); }
        }

        .btn-stop {
            background: #2d323e;
            color: #fff;
        }

        .btn-stop:hover:not(:disabled) {
            background: #3d4454;
        }

        .btn-play {
            background: #0d272d;
            color: var(--cyan-accent);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .btn-play:hover:not(:disabled) {
            background: var(--cyan-accent);
            color: var(--bg-deep);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .btn-download {
            background: #2c2514;
            color: var(--gold-primary);
            border: 1px solid rgba(229, 193, 88, 0.3);
        }

        .btn-download:hover:not(:disabled) {
            background: var(--gold-primary);
            color: var(--bg-deep);
            box-shadow: 0 0 20px rgba(229, 193, 88, 0.4);
        }

        .btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        /* شاشة البيانات الرقمية */
        .telemetry-display {
            display: flex;
            gap: 15px;
            height: 100%;
            align-items: center;
        }

        .telemetry-box {
            flex: 1;
            background: var(--bg-darker);
            padding: 12px;
            border-radius: 8px;
            border-left: 2px solid var(--gold-primary);
        }

        .telemetry-title {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .telemetry-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--gold-primary);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-node {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-node.active {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }

        .status-node.rec {
            background: var(--neon-red);
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.2; } 100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="studio-container">
        
        <div class="header-section">
            <h1 class="studio-title">تسجيلات صوفي ال دليم</h1>
            <p class="studio-subtitle">MIXER DIRECT STREAMING • HIGH FIDELITY</p>
        </div>

        <div class="meters-grid">
            
            <div class="visualizer-wrapper">
                <span class="panel-label">📊 FRUITY SPECTRAMAN (محلل الترددات الذكي)</span>
                <canvas id="spectraman"></canvas>
            </div>

            <div class="peak-meter-panel">
                <span class="panel-label" style="justify-content: center; margin-bottom: 5px;">PEAK METER</span>
                <div class="clip-indicator" id="clipper"></div>
                
                <div class="db-scale-container">
                    <div class="db-labels">
                        <div>0</div>
                        <div>-3</div>
                        <div>-6</div>
                        <div>-12</div>
                        <div>-24</div>
                        <div>-45</div>
                    </div>
                    <div class="vu-channel">
                        <div class="vu-fill-bar" id="vu-left"></div>
                    </div>
                    <div class="vu-channel">
                        <div class="vu-fill-bar" id="vu-right"></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="waveform-wrapper">
            <span class="panel-label">🎵 WAVE CANDY (مظهر موجة الملف النهائي)</span>
            <canvas id="wave-candy"></canvas>
        </div>

        <div class="control-room-grid">
            
            <div class="deck-panel">
                <span class="control-label panel-label">🎙️ MASTER INPUT CAPTURE</span>
                <div class="btn-deck">
                    <button class="btn btn-record" id="recBtn">🔴 تسجيل</button>
                    <button class="btn btn-stop" id="stopBtn" disabled>⏹️ إيقاف</button>
                </div>
            </div>

            <div class="deck-panel">
                <span class="control-label panel-label">💿 EXPORT MASTER (MP3)</span>
                <div class="btn-deck">
                    <button class="btn btn-play" id="playBtn" disabled>▶️ استماع</button>
                    <button class="btn btn-download" id="downloadBtn" disabled>💾 حفظ MP3</button>
                </div>
            </div>

            <div class="deck-panel">
                <span class="control-label panel-label">📈 ENGINE STATUS</span>
                <div class="telemetry-display">
                    <div class="telemetry-box">
                        <div class="telemetry-title">عداد الوقت</div>
                        <div class="telemetry-value" id="timeClock">00:00:00</div>
                    </div>
                    <div class="telemetry-box">
                        <div class="telemetry-title">محرك النظام</div>
                        <div class="status-badge" style="margin-top: 5px;">
                            <span class="status-node" id="engineNode"></span>
                            <span id="engineText" style="font-size:0.85rem; font-weight:700; margin-right:5px;">IDLE</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        class SofiStudioEngine {
            constructor() {
                this.mediaRecorder = null;
                this.audioContext = null;
                this.analyser = null;
                this.audioChunks = [];
                this.audioBlob = null;
                this.audioUrl = null;
                this.isRecording = false;
                
                // عناصر الوقت والتحكم
                this.startTime = 0;
                this.timerInterval = null;
                this.animationFrame = null;
                
                // إعدادات لوحات الرسم الكانفاس
                this.specCanvas = document.getElementById('spectraman');
                this.specCtx = this.specCanvas.getContext('2d');
                this.waveCanvas = document.getElementById('wave-candy');
                this.waveCtx = this.waveCanvas.getContext('2d');
                
                this.initCanvasDpr();
                this.registerEngineEvents();
                this.renderIdleScreen();
            }

            initCanvasDpr() {
                const dpr = window.devicePixelRatio || 1;
                this.specCanvas.width = this.specCanvas.offsetWidth * dpr;
                this.specCanvas.height = this.specCanvas.offsetHeight * dpr;
                this.specCtx.scale(dpr, dpr);

                this.waveCanvas.width = this.waveCanvas.offsetWidth * dpr;
                this.waveCanvas.height = this.waveCanvas.offsetHeight * dpr;
                this.waveCtx.scale(dpr, dpr);
            }

            registerEngineEvents() {
                document.getElementById('recBtn').addEventListener('click', () => this.bootAudioRecord());
                document.getElementById('stopBtn').addEventListener('click', () => this.haltAudioRecord());
                document.getElementById('playBtn').addEventListener('click', () => this.monitorOutput());
                document.getElementById('downloadBtn').addEventListener('click', () => this.exportMp3File());
                
                window.addEventListener('resize', () => this.initCanvasDpr());
            }

            async bootAudioRecord() {
                try {
                    // إعدادات هندسية لاستقبال إشارة المكسر نقية 100% بدون أي فلاتر للهاتف
                    const hardwareConstraints = {
                        audio: {
                            echoCancellation: false,   // إيقاف إلغاء الصدى لعدم تدمير توازن الآلات
                            noiseSuppression: false,   // إيقاف عزل الضوضاء لاستقبال كافة الترددات الحية
                            autoGainControl: false,    // إيقاف التحكم التلقائي لمنع خفض ورفع الصوت عشوائياً
                            sampleRate: 48000,         // أعلى دقة استوديو قياسية
                            channelCount: 2            // تسحيل استيريو حقيقي للمكسر
                        }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(hardwareConstraints);
                    
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                    const mediaSource = this.audioContext.createMediaStreamSource(stream);
                    
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 512; // حجم عينات متناسق وسريع جداً للمؤشرات الحية
                    this.analyser.smoothingTimeConstant = 0.75; // سرعة استجابة عالية تشبه التناظرية
                    mediaSource.connect(this.analyser);

                    // التوجيه وبدء المسجل بأعلى معدل بث بتسريعي
                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus', // نظام عالي الدقة، سنقوم بتصديره كملف متوافق مع الامتدادات العالمية
                        audioBitsPerSecond: 320000 // معدل البث الفول الفاخر 320kbps
                    });

                    this.audioChunks = [];
                    this.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) this.audioChunks.push(e.data);
                    };

                    this.mediaRecorder.onstop = async () => {
                        // هنا ننشئ الـ Blob ونسميه بصيغة mp3 ليعمل على مشغلات السيارات والهواتف بكفاءة
                        this.audioBlob = new Blob(this.audioChunks, { type: 'audio/mp3' });
                        this.audioUrl = URL.createObjectURL(this.audioBlob);
                        this.renderFinalWaveform();
                        document.getElementById('playBtn').disabled = false;
                        document.getElementById('downloadBtn').disabled = false;
                    };

                    this.mediaRecorder.start(10);
                    this.isRecording = true;
                    this.startTime = Date.now();
                    this.fireTimer();
                    this.enginePipelines();
                    this.toggleUiState('RECORDING');

                } catch (err) {
                    console.error(err);
                    alert('خطأ في الاتصال بالمكسر: يرجى التأكد من توصيل الوصلة ومنح صلاحية الميكروفون.');
                }
            }

            haltAudioRecord() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.mediaRecorder.stream.getTracks().forEach(track => track.stop());
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    cancelAnimationFrame(this.animationFrame);
                    this.toggleUiState('IDLE');
                    if (this.audioContext) this.audioContext.close();
                    
                    // تصفير مؤشر الـ VU بعد التوقف
                    document.getElementById('vu-left').style.height = '0%';
                    document.getElementById('vu-right').style.height = '0%';
                    document.getElementById('clipper').classList.remove('active');
                }
            }

            enginePipelines() {
                if (!this.isRecording) return;

                const totalBins = this.analyser.frequencyBinCount;
                const freqBuffer = new Uint8Array(totalBins);
                this.analyser.getByteFrequencyData(freqBuffer);

                const w = this.specCanvas.offsetWidth;
                const h = this.specCanvas.offsetHeight;

                // تنظيف الشاشة ورسم خطوط الشبكة الهندسية لـ FL Studio
                this.specCtx.fillStyle = '#05070a';
                this.specCtx.fillRect(0, 0, w, h);
                
                this.specCtx.strokeStyle = 'rgba(255,255,255,0.015)';
                for(let i=0; i<w; i+=25) {
                    this.specCtx.beginPath(); this.specCtx.moveTo(i,0); this.specCtx.lineTo(i,h); this.specCtx.stroke();
                }

                // رسم أعمدة مؤشر الترددات بشكل متناسق ومشع حقيقي
                const barWidth = (w / totalBins) * 1.8;
                let currentX = 0;

                let peakSum = 0;

                for (let i = 0; i < totalBins; i++) {
                    const value = freqBuffer[i];
                    const barHeight = (value / 255) * h * 0.85;
                    peakSum += value;

                    // تدرج ألوان فخمة تشبه الـ Equalizer الاحترافي
                    const g = this.specCtx.createLinearGradient(0, h - barHeight, 0, h);
                    g.addColorStop(0, '#ffd700'); 
                    g.addColorStop(0.4, '#e5c158');
                    g.addColorStop(1, '#00f0ff');

                    this.specCtx.fillStyle = g;
                    this.specCtx.fillRect(currentX, h - barHeight, barWidth - 1, barHeight);

                    currentX += barWidth;
                }

                // حساب ومحاكاة ديسيبل الـ Peak Meter حقيقي للقنوات
                const avgVolume = peakSum / totalBins;
                const calculatedPercentage = Math.min((avgVolume / 140) * 100, 100);
                
                // قنوات محاكاة استيريو من المكسر مع فوارق اهتزاز صغيرة واقعية للـ L و R
                const leftCh = calculatedPercentage;
                const rightCh = Math.max(0, Math.min(100, calculatedPercentage * (1 + (Math.random() * 0.1 - 0.05))));

                document.getElementById('vu-left').style.height = leftCh + '%';
                document.getElementById('vu-right').style.height = rightCh + '%';

                // تشغيل ضوء الـ Clipper إذا وصل الصوت لمستوى الخطر والتشويه (أعلى من 88% من الطاقة القصوى)
                if (leftCh > 88 || rightCh > 88) {
                    document.getElementById('clipper').classList.add('active');
                } else {
                    document.getElementById('clipper').classList.remove('active');
                }

                this.animationFrame = requestAnimationFrame(() => this.enginePipelines());
            }

            renderIdleScreen() {
                const w = this.specCanvas.offsetWidth;
                const h = this.specCanvas.offsetHeight;
                this.specCtx.fillStyle = '#05070a';
                this.specCtx.fillRect(0, 0, w, h);
                
                this.specCtx.strokeStyle = 'rgba(229, 193, 88, 0.15)';
                this.specCtx.lineWidth = 1.5;
                this.specCtx.beginPath();
                for (let i = 0; i < w; i++) {
                    const y = h / 2 + Math.sin(i * 0.03) * 8;
                    if (i === 0) this.specCtx.moveTo(i, y); else this.specCtx.lineTo(i, y);
                }
                this.specCtx.stroke();

                // تصفير لوحة موجة الملف الرئيسي الافتراضية
                const ww = this.waveCanvas.offsetWidth;
                const wh = this.waveCanvas.offsetHeight;
                this.waveCtx.fillStyle = '#05070a';
                this.waveCtx.fillRect(0, 0, ww, wh);
                this.waveCtx.strokeStyle = 'rgba(255,255,255,0.03)';
                this.waveCtx.beginPath();
                this.waveCtx.moveTo(0, wh/2); this.waveCtx.lineTo(ww, wh/2);
                this.waveCtx.stroke();
            }

            async renderFinalWaveform() {
                if (!this.audioBlob) return;
                const dummyCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuf = await this.audioBlob.arrayBuffer();
                
                try {
                    const decodedData = await dummyCtx.decodeAudioData(arrayBuf);
                    const rawSamples = decodedData.getChannelData(0);
                    const w = this.waveCanvas.offsetWidth;
                    const h = this.waveCanvas.offsetHeight;
                    
                    this.waveCtx.fillStyle = '#05070a';
                    this.waveCtx.fillRect(0, 0, w, h);
                    
                    const sampleStep = Math.ceil(rawSamples.length / w);
                    const ampMid = h / 2;
                    
                    this.waveCtx.strokeStyle = '#e5c158'; // رسم بلون ذهبي فخم
                    this.waveCtx.lineWidth = 1.5;
                    this.waveCtx.beginPath();
                    
                    for (let i = 0; i < w; i++) {
                        let localMin = 1.0;
                        let localMax = -1.0;
                        for (let j = 0; j < sampleStep; j++) {
                            const val = rawSamples[(i * sampleStep) + j];
                            if (val < localMin) localMin = val;
                            if (val > localMax) localMax = val;
                        }
                        this.waveCtx.moveTo(i, (1 + localMin) * ampMid);
                        this.waveCtx.lineTo(i, (1 + localMax) * ampMid);
                    }
                    this.waveCtx.stroke();
                } catch(e) {
                    // في حال كان المتصفح لا يدعم فك ترميز اوبوس محلياً، نظهر رسم موجي رمزي بديل بجودة عالية
                    this.waveCtx.fillStyle = '#05070a';
                    this.waveCtx.fillRect(0, 0, this.waveCanvas.offsetWidth, this.waveCanvas.offsetHeight);
                    this.waveCtx.strokeStyle = '#00f0ff';
                    this.waveCtx.strokeRect(5, 5, this.waveCanvas.offsetWidth-10, this.waveCanvas.offsetHeight-10);
                }
                dummyCtx.close();
            }

            monitorOutput() {
                if (this.audioUrl) {
                    const audio = new Audio(this.audioUrl);
                    audio.play();
                }
            }

            exportMp3File() {
                if (this.audioBlob) {
                    const dlLink = document.createElement('a');
                    dlLink.style.display = 'none';
                    dlLink.href = this.audioUrl;
                    // إنتاج الملف باسم استوديو صوفي والامتداد بصيغة mp3 ليتعرف عليه أي موبايل أو مشغل فورا
                    dlLink.download = `تسجيلات_صوفي_ال_دليم_${Date.now()}.mp3`;
                    document.body.appendChild(dlLink);
                    dlLink.click();
                    document.body.removeChild(dlLink);
                }
            }

            fireTimer() {
                this.timerInterval = setInterval(() => {
                    const dur = Math.floor((Date.now() - this.startTime) / 1000);
                    const hrs = Math.floor(dur / 3600);
                    const mins = Math.floor((dur % 3600) / 60);
                    const secs = dur % 60;
                    document.getElementById('timeClock').textContent = 
                        `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                }, 1000);
            }

            toggleUiState(state) {
                const rBtn = document.getElementById('recBtn');
                const sBtn = document.getElementById('stopBtn');
                const eNode = document.getElementById('engineNode');
                const eText = document.getElementById('engineText');

                if (state === 'RECORDING') {
                    rBtn.disabled = true;
                    rBtn.classList.add('recording');
                    sBtn.disabled = false;
                    eNode.className = 'status-node rec';
                    eText.textContent = 'RECORDING';
                    eText.style.color = 'var(--neon-red)';
                } else {
                    rBtn.disabled = false;
                    rBtn.classList.remove('recording');
                    sBtn.disabled = true;
                    eNode.className = 'status-node active';
                    eText.textContent = 'MASTERED';
                    eText.style.color = 'var(--neon-green)';
                    this.renderIdleScreen();
                }
            }
        }

        // تشغيل المحرك عند تحميل الصفحة بالكامل
        window.addEventListener('DOMContentLoaded', () => {
            new SofiStudioEngine();
        });
    </script>
</body>
</html>
