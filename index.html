<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو صوفي ال دليم | مخصص للتطبيق</title>
    <link href="https://fonts.googleapis.com/css2=family=Orbitron:wght@500;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020406;
            --bg-panel: #0a0d14;
            --bg-monitor: #010203;
            --gold: #e5c158;
            --cyan: #00f0ff;
            --red: #ff2a5f;
            --text: #f1f2f6;
            --text-dim: #4b596c;
            --border: rgba(229, 193, 88, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background-image: radial-gradient(circle at 50% 15%, rgba(229, 193, 88, 0.03) 0%, transparent 65%);
        }

        .studio-container {
            width: 100%;
            max-width: 680px;
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .studio-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--cyan));
            border-radius: 16px 16px 0 0;
        }

        .header-section { text-align: center; margin-bottom: 20px; }
        .studio-title { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(229, 193, 88, 0.3); }
        .studio-subtitle { font-size: 0.65rem; color: var(--cyan); font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        /* شاشات الموجات العمودية الحقيقية */
        .hardware-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .monitor-card {
            background: var(--bg-monitor);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.01);
        }

        .panel-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            text-align: center;
        }

        canvas {
            width: 100%;
            height: 180px; /* زيادة الارتفاع لتبين الموجة بوضوح */
            background: #010204;
            display: block;
            border-radius: 4px;
        }

        /* صندوق التشغيل الآمن والتنزيل البديل داخل التطبيقات */
        .safe-player-area {
            background: #05080e;
            border: 1px dashed var(--cyan);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
        .safe-player-area p { font-size: 0.75rem; color: #ffee55; margin-bottom: 5px; }
        audio { width: 100%; margin-top: 5px; }

        .controls-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .control-box { background: #0c0f17; border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.02); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none;
        }

        .btn-rec { background: #1a080c; color: var(--red); border: 1px solid rgba(255, 42, 95, 0.15); }
        .btn-rec:hover:not(:disabled) { background: var(--red); color: #fff; }
        .btn-rec.recording { background: var(--red); color: #fff; animation: blink 0.8s infinite alternate; }

        @keyframes blink { 0% { opacity: 0.8; } 100% { opacity: 1; box-shadow: 0 0 12px var(--red); } }
        .btn-stop { background: #1e2530; color: #fff; }
        .btn-stop:hover:not(:disabled) { background: #2d3746; }

        /* زر التحميل المتوافق مع AppCreator24 */
        .btn-down { 
            background: #251f10; color: var(--gold); 
            border: 1px solid rgba(229, 193, 88, 0.2); 
            display: none; 
        }
        .btn-down:hover { background: var(--gold); color: #000; font-weight: 900; }

        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .info-node { background: var(--bg-monitor); padding: 8px; border-radius: 4px; border-right: 2px solid var(--gold); text-align: center; margin-top: 8px; }
        .info-label { font-size: 0.55rem; color: var(--text-dim); }
        .info-val { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }
    </style>
</head>
<body>

    <div class="studio-container">
        
        <div class="header-section">
            <h1 class="studio-title">صوفي ال دليم | APP ENGINE V5</h1>
            <p class="studio-subtitle">TRUE STEREO VERTICAL WAVE</p>
        </div>

        <!-- قسم شاشات الموجات الصوتية العمودية الحقيقية (يسار ويمين) -->
        <div class="hardware-display">
            <div class="monitor-card">
                <span class="panel-label">🎵 LEFT WAVE (موجة اليسار)</span>
                <canvas id="canvas-left"></canvas>
            </div>
            <div class="monitor-card">
                <span class="panel-label">🎵 RIGHT WAVE (موجة اليمين)</span>
                <canvas id="canvas-right"></canvas>
            </div>
        </div>

        <!-- مشغل الصوت الآمن داخل التطبيق للتشغيل والحفظ الاحتياطي -->
        <div class="safe-player-area" id="player-zone">
            <p>💡 جاري التحميل.. يمكنك الاستماع للمكس أو الضغط هنا مطولاً للحفظ:</p>
            <audio id="audio-output" controls></audio>
        </div>

        <!-- لوحة الأزرار والتحكم السفلية -->
        <div class="controls-wrapper">
            <div class="control-box">
                <span class="panel-label">🎙️ STEREO INPUT</span>
                <button class="btn btn-rec" id="btn-start">🔴 تسجيل ستريو</button>
                <button class="btn btn-stop" id="btn-stop" disabled>⏹️ إيقاف ومعالجة</button>
            </div>

            <div class="control-box">
                <span class="panel-label">💾 APPLICATION EXPORT</span>
                <!-- هذا الرابط أصبح مدعوماً من الـ WebView ومباشر -->
                <a href="#" id="btn-download" class="btn btn-down">💾 حفظ ملف WAV الآن</a>
                
                <div class="info-node">
                    <div class="info-label">الوقت المنقضي</div>
                    <div class="info-val" id="txt-timer">00:00</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        class ApplicationAudioEngine {
            constructor() {
                this.audioContext = null;
                this.processor = null;
                this.analyserL = null;
                this.analyserR = null;
                this.splitter = null;
                
                this.leftBuffer = [];
                this.rightBuffer = [];
                this.bufferLength = 0;
                this.isRecording = false;
                
                this.startTime = 0;
                this.timerId = null;
                this.animId = null;

                this.canL = document.getElementById('canvas-left');
                this.canR = document.getElementById('canvas-right');
                this.ctxL = this.canL.getContext('2d');
                this.ctxR = this.canR.getContext('2d');

                this.initCanvases();
                this.bindUI();
            }

            initCanvases() {
                [this.canL, this.canR].forEach(c => {
                    c.width = c.offsetWidth;
                    c.height = c.offsetHeight;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#010204';
                    ctx.fillRect(0, 0, c.width, c.height);
                });
            }

            bindUI() {
                document.getElementById('btn-start').addEventListener('click', () => this.start());
                document.getElementById('btn-stop').addEventListener('click', () => this.stop());
                window.addEventListener('resize', () => this.initCanvases());
            }

            async start() {
                try {
                    this.leftBuffer = [];
                    this.rightBuffer = [];
                    this.bufferLength = 0;

                    const constraints = {
                        audio: {
                            channelCount: { ideal: 2 }, 
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = this.audioContext.createMediaStreamSource(stream);

                    this.splitter = this.audioContext.createChannelSplitter(2);
                    this.analyserL = this.audioContext.createAnalyser();
                    this.analyserR = this.audioContext.createAnalyser();
                    
                    // ضبط لإنتاج دقة موجات ناعمة وممتازة
                    this.analyserL.fftSize = 2048;
                    this.analyserR.fftSize = 2048;

                    source.connect(this.splitter);
                    this.splitter.connect(this.analyserL, 0); 
                    this.splitter.connect(this.analyserR, 1); 

                    this.processor = this.audioContext.createScriptProcessor(4096, 2, 2);
                    
                    this.processor.onaudioprocess = (e) => {
                        if (!this.isRecording) return;
                        const L = e.inputBuffer.getChannelData(0);
                        const R = e.inputBuffer.getChannelData(1) || L;

                        this.leftBuffer.push(new Float32Array(L));
                        this.rightBuffer.push(new Float32Array(R));
                        this.bufferLength += L.length;
                    };

                    source.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    this.isRecording = true;
                    this.startTime = Date.now();
                    
                    this.startClock();
                    this.drawWaves();

                    document.getElementById('btn-start').disabled = true;
                    document.getElementById('btn-start').classList.add('recording');
                    document.getElementById('btn-stop').disabled = false;
                    document.getElementById('btn-download').style.display = 'none';
                    document.getElementById('player-zone').style.display = 'none';

                } catch (err) {
                    alert('يرجى إعطاء صلاحية المايك للتطبيق من إعدادات الهاتف ليعمل التسجيل الستريو.');
                }
            }

            stop() {
                if (!this.isRecording) return;
                this.isRecording = false;

                clearInterval(this.timerId);
                cancelAnimationFrame(this.animId);

                if (this.processor) this.processor.disconnect();
                if (this.splitter) this.splitter.disconnect();
                if (this.audioContext) this.audioContext.close();

                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').classList.remove('recording');
                document.getElementById('btn-stop').disabled = true;

                this.compileWavForApp();
            }

            compileWavForApp() {
                const flatL = this.mergeChunks(this.leftBuffer, this.bufferLength);
                const flatR = this.mergeChunks(this.rightBuffer, this.bufferLength);

                const interleaved = new Float32Array(this.bufferLength * 2);
                let idx = 0;
                for (let i = 0; i < this.bufferLength; i++) {
                    interleaved[idx++] = flatL[i];
                    interleaved[idx++] = flatR[i];
                }

                const buffer = new ArrayBuffer(44 + interleaved.length * 2);
                const view = new DataView(buffer);
                const sampleRate = this.audioContext.sampleRate || 44100;

                this.writeStr(view, 0, 'RIFF');
                view.setUint32(4, 36 + interleaved.length * 2, true);
                this.writeStr(view, 8, 'WAVE');
                this.writeStr(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); 
                view.setUint16(22, 2, true); 
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 4, true);
                view.setUint16(32, 4, true);
                view.setUint16(34, 16, true); 
                this.writeStr(view, 36, 'data');
                view.setUint32(40, interleaved.length * 2, true);

                let offset = 44;
                for (let i = 0; i < interleaved.length; i++, offset += 2) {
                    let s = Math.max(-1, Math.min(1, interleaved[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }

                const blob = new Blob([view], { type: 'audio/wav' });
                
                // تحويل البيانت إلى رابط نصي Base64 متوافق 100% مع تطبيقات الموبايل والـ WebView
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64Url = reader.result;
                    
                    const player = document.getElementById('audio-output');
                    player.src = base64Url;
                    document.getElementById('player-zone').style.display = 'block';

                    const dlBtn = document.getElementById('btn-download');
                    dlBtn.href = base64Url;
                    dlBtn.download = `Sufi_Master_${Date.now()}.wav`;
                    dlBtn.style.display = 'flex';
                };
                reader.readAsDataURL(blob);
                
                this.initCanvases();
            }

            mergeChunks(chunks, totalLen) {
                const out = new Float32Array(totalLen);
                let offset = 0;
                for (let i = 0; i < chunks.length; i++) {
                    out.set(chunks[i], offset);
                    offset += chunks[i].length;
                }
                return out;
            }

            writeStr(v, off, str) {
                for (let i = 0; i < str.length; i++) {
                    v.setUint8(off + i, str.charCodeAt(i));
                }
            }

            drawWaves() {
                if (!this.isRecording) return;
                this.animId = requestAnimationFrame(() => this.drawWaves());

                const lenL = this.analyserL.fftSize;
                const dataL = new Uint8Array(lenL);
                // استخدام دالة الدومين الزمني لإنتاج موجة اهتزاز حقيقية وليس أعمدة ترددية
                this.analyserL.getByteTimeDomainData(dataL);

                const lenR = this.analyserR.fftSize;
                const dataR = new Uint8Array(lenR);
                this.analyserR.getByteTimeDomainData(dataR);

                this.renderVerticalOscilloscope(this.ctxL, this.canL, dataL, lenL, '#00f0ff');
                this.renderVerticalOscilloscope(this.ctxR, this.canR, dataR, lenR, '#ff2a5f');
            }

            renderVerticalOscilloscope(ctx, canvas, data, len, neonColor) {
                const w = canvas.width;
                const h = canvas.height;
                ctx.fillStyle = '#010204';
                ctx.fillRect(0, 0, w, h);

                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = neonColor;
                ctx.shadowBlur = 10;
                ctx.shadowColor = neonColor;

                // رسم الموجة بشكل عامودي صاعد وهابط ويهتز من المنتصف يميناً ويساراً
                for (let i = 0; i < len; i++) {
                    const v = data[i] / 128.0; // نقطة الارتكاز المركزية للموجة
                    const x = (v * w) / 2;
                    const y = (i / len) * h;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
                ctx.shadowBlur = 0; // تصفير الهالة للحفاظ على سرعة المتصفح
            }

            startClock() {
                this.timerId = setInterval(() => {
                    const sec = Math.floor((Date.now() - this.startTime) / 1000);
                    const m = String(Math.floor(sec / 60)).padStart(2, '0');
                    const s = String(sec % 60).padStart(2, '0');
                    document.getElementById('txt-timer').textContent = `${m}:${s}`;
                }, 1000);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new ApplicationAudioEngine();
        });
    </script>
</body>
</html>
