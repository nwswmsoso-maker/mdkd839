<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو صوفي ال دليم | النسخة المستقرة للتطبيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Cairo:wght=400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020406;
            --bg-panel: #0a0d14;
            --bg-monitor: #010204;
            --gold: #e5c158;
            --cyan: #00f0ff;
            --red: #ff2a5f;
            --green: #00ff66;
            --text: #f1f2f6;
            --border: rgba(229, 193, 88, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background-image: radial-gradient(circle at 50% 15%, rgba(229, 193, 88, 0.03) 0%, transparent 65%);
        }

        .studio-container {
            width: 100%;
            max-width: 680px;
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .studio-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--cyan));
            border-radius: 16px 16px 0 0;
        }

        .header-section { text-align: center; margin-bottom: 20px; }
        .studio-title { font-size: 1.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(229, 193, 88, 0.3); }
        .studio-subtitle { font-size: 0.65rem; color: var(--cyan); font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        /* شاشات الموجات العمودية المتحركة */
        .hardware-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .monitor-card {
            background: var(--bg-monitor);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.01);
        }

        .panel-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            text-align: center;
        }

        canvas {
            width: 100%;
            height: 220px; /* زيادة الارتفاع لرؤية تدفق الموجة بشكل ممتاز */
            background: #010204;
            display: block;
            border-radius: 4px;
        }

        /* حالة السيرفر والتحميل */
        .status-bar {
            background: #05080e;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 15px;
            color: var(--cyan);
            display: none;
        }

        .controls-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .control-box { background: #0c0f17; border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.02); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none;
        }

        .btn-rec { background: #1a080c; color: var(--red); border: 1px solid rgba(255, 42, 95, 0.15); }
        .btn-rec.recording { background: var(--red); color: #fff; animation: blink 0.8s infinite alternate; }

        @keyframes blink { 0% { opacity: 0.8; } 100% { opacity: 1; box-shadow: 0 0 12px var(--red); } }
        .btn-stop { background: #1e2530; color: #fff; }

        /* زر حفظ التطبيقات الفوري بقوة السيرفر السحابي */
        .btn-down { 
            background: var(--green); color: #000; 
            font-weight: 900;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            display: none; 
        }

        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .info-node { background: var(--bg-monitor); padding: 8px; border-radius: 4px; border-right: 2px solid var(--gold); text-align: center; margin-top: 8px; }
        .info-label { font-size: 0.55rem; color: #54657a; }
        .info-val { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }
    </style>
</head>
<body>

    <div class="studio-container">
        
        <div class="header-section">
            <h1 class="studio-title">صوفي ال دليم | CLOUD ENGINE V6</h1>
            <p class="studio-subtitle">SCROLLING VERTICAL WAVE & APP BYPASS</p>
        </div>

        <!-- شاشات الموجات التناظرية العمودية المستمرة (تتحرك للأعلى مثل الـ FL Studio) -->
        <div class="hardware-display">
            <div class="monitor-card">
                <span class="panel-label">🎚️ LEFT TRACK (تراك اليسار)</span>
                <canvas id="canvas-left"></canvas>
            </div>
            <div class="monitor-card">
                <span class="panel-label">🎚️ RIGHT TRACK (تراك اليمين)</span>
                <canvas id="canvas-right"></canvas>
            </div>
        </div>

        <!-- شريط متابعة حالة الاتصال ومعالجة السيرفر للتطبيق -->
        <div class="status-bar" id="status-display">جاري تهيئة النظام...</div>

        <!-- لوحة التحكم -->
        <div class="controls-wrapper">
            <div class="control-box">
                <span class="panel-label">🎙️ ENGINE STATUS</span>
                <button class="btn btn-rec" id="btn-start">🔴 تسجيل ستريو صافي</button>
                <button class="btn btn-stop" id="btn-stop" disabled>⏹️ إيقاف ومعالجة</button>
            </div>

            <div class="control-box">
                <span class="panel-label">💾 MOBILE DOWNLOAD</span>
                <!-- زر التحميل الفوري باستجابة السيرفر لكسر حظر الحفظ -->
                <a href="#" id="btn-download" class="btn btn-down">📥 حفظ ملف WAV للموبايل</a>
                
                <div class="info-node">
                    <div class="info-label">وقت التسجيل</div>
                    <div class="info-val" id="txt-timer">00:00</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        class CloudAudioEngine {
            constructor() {
                this.audioContext = null;
                this.processor = null;
                this.analyserL = null;
                this.analyserR = null;
                this.splitter = null;
                
                this.leftBuffer = [];
                this.rightBuffer = [];
                this.bufferLength = 0;
                this.isRecording = false;
                
                this.startTime = 0;
                this.timerId = null;
                this.animId = null;

                // مصفوفات حفظ تاريخ الموجة لإنتاج الحركة العمودية المستمرة
                this.waveHistoryL = new Array(120).fill(0);
                this.waveHistoryR = new Array(120).fill(0);

                this.canL = document.getElementById('canvas-left');
                this.canR = document.getElementById('canvas-right');
                this.ctxL = this.canL.getContext('2d');
                this.ctxR = this.canR.getContext('2d');

                this.initCanvases();
                this.bindUI();
            }

            initCanvases() {
                [this.canL, this.canR].forEach(c => {
                    c.width = c.offsetWidth;
                    c.height = c.offsetHeight;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#010204';
                    ctx.fillRect(0, 0, c.width, c.height);
                });
            }

            bindUI() {
                document.getElementById('btn-start').addEventListener('click', () => this.start());
                document.getElementById('btn-stop').addEventListener('click', () => this.stop());
                window.addEventListener('resize', () => this.initCanvases());
            }

            async start() {
                try {
                    this.leftBuffer = [];
                    this.rightBuffer = [];
                    this.bufferLength = 0;
                    this.waveHistoryL.fill(0);
                    this.waveHistoryR.fill(0);

                    const constraints = {
                        audio: {
                            channelCount: { ideal: 2 }, 
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = this.audioContext.createMediaStreamSource(stream);

                    this.splitter = this.audioContext.createChannelSplitter(2);
                    this.analyserL = this.audioContext.createAnalyser();
                    this.analyserR = this.audioContext.createAnalyser();
                    
                    this.analyserL.fftSize = 1024;
                    this.analyserR.fftSize = 1024;

                    source.connect(this.splitter);
                    this.splitter.connect(this.analyserL, 0); 
                    this.splitter.connect(this.analyserR, 1); 

                    this.processor = this.audioContext.createScriptProcessor(4096, 2, 2);
                    
                    this.processor.onaudioprocess = (e) => {
                        if (!this.isRecording) return;
                        const L = e.inputBuffer.getChannelData(0);
                        const R = e.inputBuffer.getChannelData(1) || L;

                        this.leftBuffer.push(new Float32Array(L));
                        this.rightBuffer.push(new Float32Array(R));
                        this.bufferLength += L.length;
                    };

                    source.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    this.isRecording = true;
                    this.startTime = Date.now();
                    
                    this.startClock();
                    this.drawScrollingTrack();

                    document.getElementById('btn-start').disabled = true;
                    document.getElementById('btn-start').classList.add('recording');
                    document.getElementById('btn-stop').disabled = false;
                    document.getElementById('btn-download').style.display = 'none';
                    
                    const statusBar = document.getElementById('status-display');
                    statusBar.style.display = 'block';
                    statusBar.style.color = '#00f0ff';
                    statusBar.textContent = '🎙️ جاري تسجيل الستريو الحي ومراقبة الموجات الصاعدة...';

                } catch (err) {
                    alert('يرجى التأكد من إعطاء التطبيق صلاحية استخدام المايك من إعدادات الهاتف المتقدمة.');
                }
            }

            stop() {
                if (!this.isRecording) return;
                this.isRecording = false;

                clearInterval(this.timerId);
                cancelAnimationFrame(this.animId);

                if (this.processor) this.processor.disconnect();
                if (this.splitter) this.splitter.disconnect();
                if (this.audioContext) this.audioContext.close();

                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-start').classList.remove('recording');
                document.getElementById('btn-stop').disabled = true;

                this.uploadAndExport();
            }

            uploadAndExport() {
                const statusBar = document.getElementById('status-display');
                statusBar.style.color = '#e5c158';
                statusBar.textContent = '⚡ جاري هندسة الصوت وبناء تراك الـ WAV الستريو...';

                // معالجة ملف الـ WAV الصافي
                const flatL = this.mergeChunks(this.leftBuffer, this.bufferLength);
                const flatR = this.mergeChunks(this.rightBuffer, this.bufferLength);

                const interleaved = new Float32Array(this.bufferLength * 2);
                let idx = 0;
                for (let i = 0; i < this.bufferLength; i++) {
                    interleaved[idx++] = flatL[i];
                    interleaved[idx++] = flatR[i];
                }

                const buffer = new ArrayBuffer(44 + interleaved.length * 2);
                const view = new DataView(buffer);
                const sampleRate = this.audioContext.sampleRate || 44100;

                this.writeStr(view, 0, 'RIFF');
                view.setUint32(4, 36 + interleaved.length * 2, true);
                this.writeStr(view, 8, 'WAVE');
                this.writeStr(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); 
                view.setUint16(22, 2, true); 
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 4, true);
                view.setUint16(32, 4, true);
                view.setUint16(34, 16, true); 
                this.writeStr(view, 36, 'data');
                view.setUint32(40, interleaved.length * 2, true);

                let offset = 44;
                for (let i = 0; i < interleaved.length; i++, offset += 2) {
                    let s = Math.max(-1, Math.min(1, interleaved[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }

                const blob = new Blob([view], { type: 'audio/wav' });

                statusBar.textContent = '☁️ جاري توليد رابط التحميل المباشر للتطبيق تلقائياً...';

                // إرسال ورفع فوري لملف الصوت إلى السيرفر لإنتاج رابط حقيقي يعبر حظر التطبيق
                const formData = new FormData();
                formData.append('file', blob, `Sufi_Studio_${Date.now()}.wav`);

                fetch('https://file.io/?expires=1d', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        statusBar.style.color = '#00ff66';
                        statusBar.textContent = '✅ جاهز! تم فك حظر النظام وتوليد الملف بنجاح.';
                        
                        const dlBtn = document.getElementById('btn-download');
                        dlBtn.href = data.link; // الرابط الجديد أصبح الـ URL السحابي المباشر المدعوم من الهاتف
                        dlBtn.style.display = 'flex';
                    } else {
                        statusBar.style.color = '#ff2a5f';
                        statusBar.textContent = '❌ فشل الرفع التلقائي، يرجى المحاولة مرة أخرى.';
                    }
                })
                .catch(err => {
                    statusBar.style.color = '#ff2a5f';
                    statusBar.textContent = '❌ مشكلة في الاتصال، تأكد من تشغيل الإنترنت داخل التطبيق.';
                });

                this.initCanvases();
            }

            mergeChunks(chunks, totalLen) {
                const out = new Float32Array(totalLen);
                let offset = 0;
                for (let i = 0; i < chunks.length; i++) {
                    out.set(chunks[i], offset);
                    offset += chunks[i].length;
                }
                return out;
            }

            writeStr(v, off, str) {
                for (let i = 0; i < str.length; i++) {
                    v.setUint8(off + i, str.charCodeAt(i));
                }
            }

            drawScrollingTrack() {
                if (!this.isRecording) return;
                this.animId = requestAnimationFrame(() => this.drawScrollingTrack());

                const dataL = new Uint8Array(this.analyserL.fftSize);
                this.analyserL.getByteTimeDomainData(dataL);

                const dataR = new Uint8Array(this.analyserR.fftSize);
                this.analyserR.getByteTimeDomainData(dataR);

                // حساب قيمة الانحراف الأعلى (النبضة الصوتية) في هذا الجزء من الثانية
                let maxL = 0, maxR = 0;
                for (let i = 0; i < dataL.length; i++) {
                    let devL = Math.abs(dataL[i] - 128);
                    let devR = Math.abs(dataR[i] - 128);
                    if (devL > maxL) maxL = devL;
                    if (devR > maxR) maxR = devR;
                }

                // دفع القيمة لتتحرك للأعلى، وحذف القديمة لإنتاج تأثير التراك المستمر
                this.waveHistoryL.push(maxL);
                this.waveHistoryR.push(maxR);
                if (this.waveHistoryL.length > 120) this.waveHistoryL.shift();
                if (this.waveHistoryR.length > 120) this.waveHistoryR.shift();

                this.renderScrollingWaveform(this.ctxL, this.canL, this.waveHistoryL, '#00f0ff');
                this.renderScrollingWaveform(this.ctxR, this.canR, this.waveHistoryR, '#ff2a5f');
            }

            renderScrollingWaveform(ctx, canvas, history, neonColor) {
                const w = canvas.width;
                const h = canvas.height;
                ctx.fillStyle = '#010204';
                ctx.fillRect(0, 0, w, h);

                const midX = w / 2;
                const step = h / history.length;

                // رسم خط السنتر النحيف
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(midX, 0);
                ctx.lineTo(midX, h);
                ctx.stroke();

                ctx.beginPath();
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = neonColor;
                ctx.shadowBlur = 8;
                ctx.shadowColor = neonColor;

                // رسم تراك الموجة المتناظرة الصاعدة عمودياً بالكامل
                for (let i = 0; i < history.length; i++) {
                    let amp = (history[i] / 128) * (w / 2) * 0.95;
                    let y = h - (i * step); // الحركة من الأسفل إلى الأعلى

                    if (i === 0) ctx.moveTo(midX - amp, y);
                    else ctx.lineTo(midX - amp, y);
                }

                for (let i = history.length - 1; i >= 0; i--) {
                    let amp = (history[i] / 128) * (w / 2) * 0.95;
                    let y = h - (i * step);
                    ctx.lineTo(midX + amp, y);
                }

                ctx.closePath();
                ctx.fillStyle = neonColor + '18'; // تعبئة نيون خفيفة جداً داخل التراك
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            startClock() {
                this.timerId = setInterval(() => {
                    const sec = Math.floor((Date.now() - this.startTime) / 1000);
                    const m = String(Math.floor(sec / 60)).padStart(2, '0');
                    const s = String(sec % 60).padStart(2, '0');
                    document.getElementById('txt-timer').textContent = `${m}:${s}`;
                }, 1000);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new CloudAudioEngine();
        });
    </script>
</body>
</html>
