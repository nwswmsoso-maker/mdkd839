<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيلات صوفي ال دليم | v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-panel: #0f121a;
            --bg-darker: #020406;
            --gold-primary: #e5c158;
            --cyan-accent: #00f0ff;
            --neon-red: #ff2a5f;
            --neon-green: #00ff66;
            --text-main: #f1f2f6;
            --text-muted: #64748b;
            --border-gold: rgba(229, 193, 88, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-image: radial-gradient(circle at 50% 10%, rgba(229, 193, 88, 0.05) 0%, transparent 50%);
        }

        .studio-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-panel);
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            padding: 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            position: relative;
        }

        .studio-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--neon-red), var(--gold-primary), var(--cyan-accent));
            border-radius: 20px 20px 0 0;
        }

        .header-section { text-align: center; margin-bottom: 25px; }
        .studio-title { font-size: 2rem; font-weight: 900; color: var(--gold-primary); text-shadow: 0 0 20px rgba(229, 193, 88, 0.4); }
        .studio-subtitle { font-size: 0.8rem; color: var(--cyan-accent); font-family: 'Orbitron', sans-serif; letter-spacing: 3px; margin-top: 5px; }

        .screen-card { background: var(--bg-darker); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .panel-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--gold-primary); letter-spacing: 2px; margin-bottom: 10px; display: block; }
        #analyzer-view { width: 100%; height: 140px; background: #020406; display: block; border-radius: 6px; }

        /* منطقة مشغل الصوت الاحتياطي */
        .playback-box {
            background: #090d16;
            border: 1px dashed var(--cyan-accent);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .playback-box.active { display: block; }
        audio { width: 100%; margin-top: 10px; }

        .control-console { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .console-box { background: #131822; border-radius: 10px; padding: 15px; }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 6px;
            font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-bottom: 10px;
        }

        .btn-rec { background: #240c12; color: var(--neon-red); border: 1px solid rgba(255, 42, 95, 0.2); }
        .btn-rec:hover:not(:disabled) { background: var(--neon-red); color: #fff; box-shadow: 0 0 15px rgba(255, 42, 95, 0.4); }
        .btn-rec.recording { background: var(--neon-red); color: #fff; animation: pulseRec 0.8s infinite alternate; }

        @keyframes pulseRec { 0% { box-shadow: 0 0 2px var(--neon-red); } 100% { box-shadow: 0 0 18px var(--neon-red); } }
        .btn-stop { background: #334155; color: #fff; }
        .btn-stop:hover:not(:disabled) { background: #475569; }
        .btn-down { background: #251f10; color: var(--gold-primary); border: 1px solid rgba(229, 193, 88, 0.2); }
        .btn-down:hover:not(:disabled) { background: var(--gold-primary); color: #000; }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .data-node { background: var(--bg-darker); padding: 10px; border-radius: 6px; border-right: 2px solid var(--gold-primary); text-align: center; }
        .data-label { font-size: 0.6rem; color: var(--text-muted); }
        .data-value { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 700; color: var(--gold-primary); margin-top: 2px; }
    </style>
</head>
<body>

    <div class="studio-container">
        <div class="header-section">
            <h1 class="studio-title">تسجيلات صوفي ال دليم</h1>
            <p class="studio-subtitle">AUDIO ENGINE V2 • BYPASS MODE</p>
        </div>

        <div class="screen-card">
            <span class="panel-label">📊 AUDIO SPECTRUM</span>
            <canvas id="analyzer-view"></canvas>
        </div>

        <!-- صندوق الاستماع والإنقاذ في حال تعطل التحميل الخارجي -->
        <div class="playback-box" id="safe-player-zone">
            <span class="panel-label" style="color: var(--cyan-accent)">🎧 جاهز للاستماع والحفظ الآمن</span>
            <audio id="main-audio-player" controls></audio>
        </div>

        <div class="control-console">
            <div class="console-box">
                <span class="panel-label">🎙️ CONTROL</span>
                <button class="btn btn-rec" id="start-engine">🔴 بدء التسجيل</button>
                <button class="btn btn-stop" id="stop-engine" disabled>⏹️ إيقاف وحفظ</button>
            </div>

            <div class="console-box">
                <span class="panel-label">💾 EXPORT</span>
                <button class="btn btn-down" id="down-master" disabled>💾 تحميل ملف WAV</button>
                <div class="data-node" style="margin-top: 12px;">
                    <div class="data-label">زمن التسجيل</div>
                    <div class="data-value" id="clock-display">00:00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class SimpleZoomEngine {
            constructor() {
                this.audioContext = null;
                this.processor = null;
                this.analyser = null;
                this.leftChannel = [];
                this.rightChannel = [];
                this.recordingLength = 0;
                this.isRecording = false;
                this.startTime = 0;
                this.timerInterval = null;
                this.wavBlob = null;
                this.wavUrl = null;

                this.canvas = document.getElementById('analyzer-view');
                this.canvasCtx = this.canvas.getContext('2d');
                
                this.initCanvas();
                this.bindButtons();
            }

            initCanvas() {
                this.canvas.width = this.canvas.offsetWidth;
                this.canvas.height = this.canvas.offsetHeight;
                this.canvasCtx.fillStyle = '#020406';
                this.canvasCtx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            bindButtons() {
                document.getElementById('start-engine').addEventListener('click', () => this.start());
                document.getElementById('stop-engine').addEventListener('click', () => this.stop());
                document.getElementById('down-master').addEventListener('click', () => this.downloadWav());
            }

            async start() {
                try {
                    // قيود صريحة ومباشرة بدون تعقيد لإجبار المتصفح على إطفاء الفلاتر
                    const cleanConstraints = {
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(cleanConstraints);
                    
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = this.audioContext.createMediaStreamSource(stream);
                    
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 128;

                    this.processor = this.audioContext.createScriptProcessor(4096, 2, 2);
                    
                    this.leftChannel = [];
                    this.rightChannel = [];
                    this.recordingLength = 0;

                    this.processor.onaudioprocess = (e) => {
                        if (!this.isRecording) return;
                        const L = e.inputBuffer.getChannelData(0);
                        const R = e.inputBuffer.getChannelData(1) || L;
                        
                        this.leftChannel.push(new Float32Array(L));
                        this.rightChannel.push(new Float32Array(R));
                        this.recordingLength += L.length;
                    };

                    source.connect(this.analyser);
                    this.analyser.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    this.isRecording = true;
                    this.startTime = Date.now();
                    this.updateClock();
                    this.drawVisuals();

                    document.getElementById('start-engine').disabled = true;
                    document.getElementById('start-engine').classList.add('recording');
                    document.getElementById('stop-engine').disabled = false;
                    document.getElementById('down-master').disabled = true;
                    document.getElementById('safe-player-zone').classList.remove('active');

                } catch (err) {
                    alert('يرجى إعطاء صلاحية المايك، أو افتح الرابط بمتصفح Chrome كروم حصراً خارج فيسبوك/واتساب.');
                }
            }

            stop() {
                if (!this.isRecording) return;
                this.isRecording = false;
                
                clearInterval(this.timerInterval);
                
                if (this.processor) this.processor.disconnect();
                if (this.analyser) this.analyser.disconnect();
                if (this.audioContext) this.audioContext.close();

                document.getElementById('start-engine').disabled = false;
                document.getElementById('start-engine').classList.remove('recording');
                document.getElementById('stop-engine').disabled = true;

                // معالجة وحفظ البيانات الصوتية
                this.generateWav();
            }

            generateWav() {
                const flatL = this.flatten(this.leftChannel, this.recordingLength);
                const flatR = this.flatten(this.rightChannel, this.recordingLength);
                
                const interleaved = new Float32Array(this.recordingLength * 2);
                let index = 0;
                for (let i = 0; i < this.recordingLength; i++) {
                    interleaved[index++] = flatL[i];
                    interleaved[index++] = flatR[i];
                }

                const buffer = new ArrayBuffer(44 + interleaved.length * 2);
                const view = new DataView(buffer);

                const sampleRate = this.audioContext.sampleRate || 44100;

                this.writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + interleaved.length * 2, true);
                this.writeString(view, 8, 'WAVE');
                this.writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 2, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 4, true);
                view.setUint16(32, 4, true);
                view.setUint16(34, 16, true);
                this.writeString(view, 36, 'data');
                view.setUint32(40, interleaved.length * 2, true);

                let offset = 44;
                for (let i = 0; i < interleaved.length; i++, offset += 2) {
                    let s = Math.max(-1, Math.min(1, interleaved[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }

                this.wavBlob = new Blob([view], { type: 'audio/wav' });
                this.wavUrl = URL.createObjectURL(this.wavBlob);

                // تحديث مشغل الصوت الآمن داخل الصفحة لمنع الكراش
                const player = document.getElementById('main-audio-player');
                player.src = this.wavUrl;
                document.getElementById('safe-player-zone').classList.add('active');
                document.getElementById('down-master').disabled = false;
            }

            flatten(channels, len) {
                const result = new Float32Array(len);
                let offset = 0;
                for (let i = 0; i < channels.length; i++) {
                    result.set(channels[i], offset);
                    offset += channels[i].length;
                }
                return result;
            }

            writeString(view, offset, str) {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
            }

            downloadWav() {
                if (!this.wavUrl) return;
                const a = document.createElement('a');
                a.href = this.wavUrl;
                // اسم إنجليزي بسيط لمنع انهيار النظام
                a.download = `sufi_rec_${Date.now()}.wav`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => document.body.removeChild(a), 100);
            }

            updateClock() {
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    document.getElementById('clock-display').textContent = `${m}:${s}`;
                }, 1000);
            }

            drawVisuals() {
                if (!this.isRecording) return;
                requestAnimationFrame(() => this.drawVisuals());

                const bins = this.analyser.frequencyBinCount;
                const data = new Uint8Array(bins);
                this.analyser.getByteFrequencyData(data);

                this.canvasCtx.fillStyle = '#020406';
                this.canvasCtx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                const barWidth = this.canvas.width / bins;
                let x = 0;

                for (let i = 0; i < bins; i++) {
                    const h = (data[i] / 255) * this.canvas.height;
                    this.canvasCtx.fillStyle = `hsl(${i * 4}, 100%, 60%)`;
                    this.canvasCtx.fillRect(x, this.canvas.height - h, barWidth - 1, h);
                    x += barWidth;
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => { new SimpleZoomEngine(); });
    </script>
</body>
</html>
